[directories]
astetcdir => /etc/asterisk
; astmoddir is intentionally omitted here — let Asterisk use its compiled-in default.
; On Debian/Ubuntu 24.04 package installs the real path is:
;   /usr/lib/x86_64-linux-gnu/asterisk/modules
; Hardcoding /usr/lib/asterisk/modules causes startup failure on those distros.
; onboard.sh detects and writes the correct path during installation.
astvarlibdir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk

[options]
verbose=3
debug=0
nocolor=yes
