; ============================================================
; Inbound context — AI attendant
; Dialing 9999 from a softphone triggers the AI agent
; Also catches any external inbound calls
; ============================================================
[inbound]
exten => 9999,1,NoOp(AI Attendant called from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Stasis(pbx-agent,${CALLERID(num)},${EXTEN})
 same => n,Hangup()

; Catch-all for any other inbound number (from SIP trunk later)
exten => _X.,1,NoOp(Inbound call from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Stasis(pbx-agent,${CALLERID(num)},${EXTEN})
 same => n,Hangup()

; ============================================================
; Internal context — direct extension-to-extension dialing
; ============================================================
[internal]
; Dial the AI attendant
exten => 9999,1,Goto(inbound,9999,1)

; ============================================================
; Agent presence feature codes — MVP human-agent sign-in
; *55 = sign in / choose language / become available
; *56 = set break
; *57 = set available
; *58 = set offline
; ============================================================
exten => *55,1,NoOp(Agent login for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Stasis(pbx-agent,${CALLERID(num)},agent-login)
 same => n,Hangup()

exten => *56,1,NoOp(Agent break for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Stasis(pbx-agent,${CALLERID(num)},agent-break)
 same => n,Hangup()

exten => *57,1,NoOp(Agent available for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Stasis(pbx-agent,${CALLERID(num)},agent-available)
 same => n,Hangup()

exten => *58,1,NoOp(Agent offline for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Stasis(pbx-agent,${CALLERID(num)},agent-offline)
 same => n,Hangup()

exten => 1001,1,NoOp(Dial extension 1001 - Operator)
 same => n,Dial(PJSIP/1001,30,tr)
 same => n,VoiceMail(1001@default,u)
 same => n,Hangup()

exten => 1002,1,NoOp(Dial extension 1002 - Sales)
 same => n,Dial(PJSIP/1002,30,tr)
 same => n,VoiceMail(1002@default,u)
 same => n,Hangup()

exten => 1003,1,NoOp(Dial extension 1003 - Support)
 same => n,Dial(PJSIP/1003,30,tr)
 same => n,VoiceMail(1003@default,u)
 same => n,Hangup()

; ============================================================
; Fallback — if ARI agent returns control, route to operator
; ============================================================
[fallback]
exten => s,1,NoOp(AI agent returned control — routing to operator)
 same => n,Dial(PJSIP/1001,30,tr)
 same => n,Hangup()

; ============================================================
; DTMF menu — reached only when ARI routes to it via redirect.
; The Python agent handles DTMF natively via ChannelDtmfReceived
; events on the WebSocket; this context is a safety net if the
; ARI session ends before the digit is processed.
;
; 1 = Sales (1002)
; 2 = Support (1003)
; 0 = Operator (1001)
; ============================================================
[dtmf-menu]
exten => 1,1,NoOp(DTMF: Sales)
 same => n,Dial(PJSIP/1002,30,tr)
 same => n,Hangup()

exten => 2,1,NoOp(DTMF: Support)
 same => n,Dial(PJSIP/1003,30,tr)
 same => n,Hangup()

exten => 0,1,NoOp(DTMF: Operator)
 same => n,Dial(PJSIP/1001,30,tr)
 same => n,Hangup()

exten => i,1,NoOp(DTMF: Invalid digit)
 same => n,Dial(PJSIP/1001,30,tr)
 same => n,Hangup()
