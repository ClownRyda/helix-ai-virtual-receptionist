; ============================================================
; Asterisk Logger Configuration — production settings
; Logs to /var/log/asterisk/
; ============================================================
[general]
; Rotate logs on SIGHUP (asterisk -rx "logger rotate")
dateformat=%F %T

[logfiles]
; Full verbose log — rotate daily with logrotate
full => notice,warning,error,verbose

; Separate error-only log for alerting
error => error,warning

; Console — warnings and errors only in production (verbose=3 set in asterisk.conf)
console => notice,warning,error
