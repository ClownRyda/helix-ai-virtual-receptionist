;
; Mini-Voicemail Configuration
; Minimal Helix mailbox definitions for direct extension voicemail.
;

[general]
format=wav49
serveremail=asterisk
maxsilence=10
silencethreshold=128
charset=UTF-8
emaildateformat=%A, %B %d, %Y at %r
pagersubject=New VM ${MVM_COUNTER}

[1001@default]
fullname=Operator
email=root@localhost

[1002@default]
fullname=Sales
email=root@localhost

[1003@default]
fullname=Support
email=root@localhost
