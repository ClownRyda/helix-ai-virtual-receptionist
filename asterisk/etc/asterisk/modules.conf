; ============================================================
; Helix AI — Asterisk module load policy
;
; Helix uses PJSIP exclusively. chan_sip is disabled here to
; prevent it from binding port 5060 alongside PJSIP, which
; causes registration confusion and SIP authentication issues.
; ============================================================

[modules]
autoload=yes

; Disable legacy SIP channel driver — PJSIP is the only SIP stack used.
noload => chan_sip.so
