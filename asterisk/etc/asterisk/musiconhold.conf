;
; Music on Hold
; Helix ships a default file-based class that plays bundled audio from
; /var/lib/asterisk/moh. Additional classes can be layered on later.
;

[general]

[default]
mode=files
directory=/var/lib/asterisk/moh
sort=alpha
answeredonly=yes

[ai-news]
mode=custom
application=/usr/bin/ffmpeg -nostdin -loglevel quiet -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 -i https://1.airadiostream.com/aiwnn -vn -ac 1 -ar 8000 -f mulaw -
format=ulaw
answeredonly=yes

[music-rnb]
mode=custom
application=/usr/bin/ffmpeg -nostdin -loglevel quiet -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 -i https://streams.90s90s.de/rnb/mp3-192/streams.90s90s.de/ -vn -ac 1 -ar 8000 -f mulaw -
format=ulaw
answeredonly=yes
