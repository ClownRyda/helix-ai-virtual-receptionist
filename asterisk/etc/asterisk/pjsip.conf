; ============================================================
; Transport — NAT behind router on your LAN
; ============================================================
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; NAT settings — adjust local_net to your actual LAN CIDR
local_net=192.168.1.0/24
local_net=172.16.0.0/12
local_net=10.0.0.0/8
; For LAN-only softphone testing, external_media/signaling
; should be the server's LAN IP. Replace with your actual IP.
external_media_address=YOUR_SERVER_IP
external_signaling_address=YOUR_SERVER_IP

; ============================================================
; SIP Trunk (DISABLED for now — softphone testing only)
; Uncomment and fill in when you get a trunk provider
; ============================================================
; [trunk-auth]
; type=auth
; auth_type=userpass
; username=YOUR_SIP_USERNAME
; password=YOUR_SIP_PASSWORD
;
; [trunk-aor]
; type=aor
; contact=sip:YOUR_SIP_PROVIDER_HOST:5060
; qualify_frequency=30
;
; [trunk]
; type=endpoint
; context=inbound
; disallow=all
; allow=ulaw,alaw,g722
; outbound_auth=trunk-auth
; aors=trunk-aor

; ============================================================
; Extension 1001 — Operator / test softphone 1
; ============================================================
[1001]
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=1001-auth
aors=1001-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=CHANGE_ME_EXT_1001_PASSWORD

[1001-aor]
type=aor
max_contacts=2
qualify_frequency=30
remove_existing=yes

