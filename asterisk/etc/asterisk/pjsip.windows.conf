; ============================================================
; PJSIP config for Windows Docker Desktop testing
;
; Key difference from the Linux version:
;   - external_media_address and external_signaling_address
;     must be your Windows PC's LAN IP (not 127.0.0.1)
;     so Zoiper (on the same PC or LAN) gets the right RTP target.
;
; Find your Windows IP: run `ipconfig` in PowerShell,
; look for your Wi-Fi or Ethernet IPv4 address.
; Then set WINDOWS_HOST_IP in .env.windows and replace below.
; ============================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Treat Docker bridge, LAN, and loopback as local
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16
; IMPORTANT: Set this to your Windows host LAN IP
; e.g. if ipconfig shows 192.168.1.50, use that IP address
external_media_address=YOUR_WINDOWS_IP
external_signaling_address=YOUR_WINDOWS_IP

; ============================================================
; Extension 1001 — Operator / test softphone 1
; ============================================================
[1001]
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=1001-auth
aors=1001-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=CHANGE_ME_EXT_1001_PASSWORD

[1001-aor]
type=aor
max_contacts=2
qualify_frequency=30
remove_existing=yes

