# ============================================================
# Helix AI — nginx WebSocket upgrade map
#
# This file MUST be installed in nginx's http context, not
# in a server block. onboard.sh copies it to:
#   /etc/nginx/conf.d/helix-map.conf
#
# nginx-helix.conf references $helix_connection_upgrade in
# its proxy_set_header Connection directives. Without this
# map, nginx will fail its config test.
# ============================================================

map $http_upgrade $helix_connection_upgrade {
    default  upgrade;
    ''       close;
}
