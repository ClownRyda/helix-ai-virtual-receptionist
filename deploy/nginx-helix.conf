# ============================================================
# nginx reverse proxy — Helix AI Virtual Receptionist
#
# Install:
#   sudo cp deploy/nginx-helix.conf /etc/nginx/sites-available/helix
#   sudo cp deploy/nginx-helix-map.conf /etc/nginx/conf.d/helix-map.conf
#   sudo ln -s /etc/nginx/sites-available/helix /etc/nginx/sites-enabled/helix
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# onboard.sh installs both files automatically.
# The map file MUST be present — nginx will fail config test without it.
# ============================================================

server {
    listen 80;
    server_name _;  # Replace with your hostname or IP if desired

    access_log /var/log/nginx/helix-access.log;
    error_log  /var/log/nginx/helix-error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Python FastAPI — /api/ ────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # LLM responses can take up to 30s — do not time out early
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        proxy_buffering         off;
        proxy_request_buffering off;
    }

    # ── Dashboard WebSocket ───────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $helix_connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Dashboard — everything else ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade support (uses map from helix-map.conf)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $helix_connection_upgrade;

        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Block direct access to internal service paths ─────────
    location ~ ^/(ari|ollama)/ {
        deny all;
        return 403;
    }
}

# ============================================================
# HTTPS — self-signed cert (LAN) or Certbot (public)
#
# Self-signed:
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/helix.key \
#     -out /etc/ssl/certs/helix.crt \
#     -subj "/CN=$(hostname)"
#
# Then replace the server block above with:
# ============================================================
# server {
#     listen 443 ssl;
#     server_name _;
#     ssl_certificate     /etc/ssl/certs/helix.crt;
#     ssl_certificate_key /etc/ssl/private/helix.key;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ... (same location blocks as above)
# }
# server {
#     listen 80;
#     return 301 https://$host$request_uri;
# }
