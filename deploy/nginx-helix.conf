# ============================================================
# nginx reverse proxy — Helix AI Virtual Receptionist
# Install: sudo cp deploy/nginx-helix.conf /etc/nginx/sites-available/helix
#          sudo ln -s /etc/nginx/sites-available/helix /etc/nginx/sites-enabled/helix
#          sudo nginx -t && sudo systemctl reload nginx
#
# This config assumes LAN-only access (no public internet).
# For HTTPS, see the commented block at the bottom.
# ============================================================

upstream helix_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream helix_dashboard {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;  # Catch all — replace with your hostname if you have one

    access_log /var/log/nginx/helix-access.log;
    error_log  /var/log/nginx/helix-error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Python FastAPI — /api/ ────────────────────────────────
    location /api/ {
        proxy_pass         http://helix_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # LLM responses can take 10-30 seconds — do not time out early
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        # Disable buffering for streaming responses (call transcripts etc.)
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # ── Dashboard WebSocket (/ws, /socket.io if used) ────────
    location /ws {
        proxy_pass            http://helix_dashboard;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade    $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host       $host;
        proxy_read_timeout    3600s;  # Keep WS connections open
    }

    # ── Dashboard — everything else ───────────────────────────
    location / {
        proxy_pass         http://helix_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade support for the dashboard
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_read_timeout  60s;
        proxy_buffering     off;
    }

    # ── Explicitly block direct access to internal services ──
    # Belt-and-suspenders: deny any attempt to reach internal ports via nginx
    location ~ ^/(ari|ollama)/ {
        deny all;
        return 403;
    }
}

# ── WebSocket upgrade map ─────────────────────────────────────
# Add this to /etc/nginx/nginx.conf http block, or in a separate conf.d file:
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
#
# (included here as a comment — nginx requires map in http context, not server)

