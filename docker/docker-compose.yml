# ============================================================
# Helix AI — Docker Compose
# Host: Ubuntu server with a supported NVIDIA GPU
# ============================================================
#
# All SIP/RTP-facing services use host networking to avoid
# NAT headaches with Docker bridge networks.
#
# Port layout (host):
#   5060/udp        — SIP signaling (Asterisk)       PUBLIC
#   10000-19999/udp — Asterisk RTP media             PUBLIC
#   20000-20100/udp — Agent RTP (ExternalMedia)      PUBLIC
#   80/443/tcp      — nginx reverse proxy            PUBLIC
#   8088/tcp        — ARI WebSocket (Asterisk)       LOOPBACK ONLY
#   8000/tcp        — Agent REST API (Python)        LOOPBACK ONLY
#   3000/tcp        — Dashboard (Node.js)            LOOPBACK ONLY
#   11434/tcp       — Ollama LLM API                 LOOPBACK ONLY
#
# ARI, Agent API, Dashboard, and Ollama must never bind to
# 0.0.0.0. All four are accessed exclusively via nginx proxy.
# ============================================================

services:

  # ── Asterisk PBX ────────────────────────────────────────────
  asterisk:
    build:
      context: ..
      dockerfile: docker/Dockerfile.asterisk
    container_name: pbx-asterisk
    network_mode: host
    restart: unless-stopped
    volumes:
      # Live-edit configs without rebuilding
      - ../asterisk/etc/asterisk:/etc/asterisk:ro
      # Persist voicemail, recordings, etc.
      - asterisk-spool:/var/spool/asterisk
      - asterisk-logs:/var/log/asterisk
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Python AI Agent ─────────────────────────────────────────
  agent:
    build:
      context: ../agent
      dockerfile: ../docker/Dockerfile.agent
    container_name: pbx-agent
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../agent/.env
    environment:
      # Override for Docker context — Asterisk is on localhost (host network)
      - ASTERISK_HOST=127.0.0.1
      - AGENT_RTP_HOST=127.0.0.1
      - OLLAMA_HOST=http://127.0.0.1:11434
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=float16
    volumes:
      # Live-edit agent code without rebuilding
      - ../agent:/app
      # Persist SQLite database across restarts
      - agent-data:/app/data
      # Google Calendar credentials (mount from host)
      - ../agent/credentials.json:/app/credentials.json:ro
      - ../agent/token.json:/app/token.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      asterisk:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Ollama LLM Server ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: pbx-ollama
    network_mode: host
    restart: unless-stopped
    volumes:
      # Reuse models already downloaded on the host
      - ${OLLAMA_MODELS_DIR:-~/.ollama/models}:/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Dashboard (React + Express) ─────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: pbx-dashboard
    # Bind to loopback only — nginx proxies / → 127.0.0.1:3000
    # Never expose port 3000 directly to the network.
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=127.0.0.1
      - PORT=3000
      - API_BASE_URL=${API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      agent:
        condition: service_healthy

volumes:
  asterisk-spool:
  asterisk-logs:
  agent-data:
